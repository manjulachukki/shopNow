services:
  mongo:
    image: mongo:6
    container_name: shopnow-mongo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopnow-backend
    environment:
      - MONGODB_URI=mongodb://mongo:27017/shopnow
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopnow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: shopnow-admin
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  mongo_data:
